<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pomodoro Study Timer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="timer-card">

        <h1>Pomodoro Timer</h1>

        <!-- User sets study time -->
         <label for="minutesInput">Set Study Minutes:</label>
         <input type="number" id="minutesInput" placeholder="Enter study minutes">

        <!-- Timer display -->
         <div id="timer">25:00</div>

         <!-- Progress bar -->  
         <div id="progress-container">
            <div id="progress-bar"></div>
         </div>

         <!-- Mode text -->
          <p id="mode">Study Time</p>

          <!-- Buttons -->
          <div class="button-group">
            <button id="start">▶ Start</button>
            <button id="pause">⏸ Pause</button>
            <button id="reset">⟳ Reset</button>
        </div>

           <!-- Session counter -->
            <p>Completed Sessions: <span id="sessions">0</span></p>

            <!-- Alarm -->
            <audio id="alarm" src="https://www.soundjay.com/buttons/beep-07.mp3" preload="auto"></audio>
        </div>

        <script src="script.js"></script>
    </body>
</html>
